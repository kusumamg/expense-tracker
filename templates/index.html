<!DOCTYPE html>
<html>
<head>
  <title>Expense Dashboard</title>

  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="dashboard">

  <!-- Sidebar -->
  <div class="sidebar" id="sidebar">
    <h2>💰 FinTrack</h2>

    <a href="#dashboard" class="menu-btn">🏠 Overview</a>
    <a href="#transactions" class="menu-btn">📋 Transactions</a>
    <a href="#reports" class="menu-btn">📊 Reports</a>
  </div>

  <!-- Main -->
  <div class="main">

    <!-- ================= DASHBOARD ================= -->
    <section id="dashboard">
      <h1>Expense Tracker</h1>

      <div class="cards">
        <div class="card balance">
          <h3>Balance</h3>
          <p>₹{{ balance }}</p>
        </div>

        <div class="card income-card">
          <h3>Income</h3>
          <p>₹{{ income }}</p>
        </div>

        <div class="card expense-card">
          <h3>Expense</h3>
          <p>₹{{ expense }}</p>
        </div>
      </div>
    </section>

    <!-- ================= FORM ================= -->
    <form method="POST" action="/add" class="form">
      <input type="text" name="name" placeholder="Description" required>

      <select name="type">
        <option value="income">Income</option>
        <option value="expense">Expense</option>
      </select>

      <input type="number" name="amount" placeholder="Amount" required>

      <input type="date" name="date" value="{{ current_date }}" required>

      <button>Add</button>
    </form>

    <!-- ================= TRANSACTIONS ================= -->
    <section id="transactions">
      <h2>Transactions</h2>

      <table>
        <tr>
          <th>Description</th>
          <th>Date</th>
          <th>Amount</th>
          <th>Action</th>
        </tr>

        {% for item in data %}
        <tr class="{% if item[2]=='income' %}income-row{% else %}expense-row{% endif %}">
          <td>{{ item[1] }}</td>
          <td>{{ item[4] }}</td>
          <td>₹{{ item[3] }}</td>
          <td><a href="/delete/{{ item[0] }}">❌</a></td>
        </tr>
        {% endfor %}
      </table>
    </section>

    <!-- ================= REPORTS ================= -->
    <section id="reports">
      <h2>Reports</h2>

      <div class="charts">
        <div class="chart-box">
          <canvas id="myChart"></canvas>
        </div>
      </div>
    </section>

  </div>
</div>

<!-- ================= CHART SCRIPT ================= -->
<script>
  const income = {{ income | default(0) | tojson }};
  const expense = {{ expense | default(0) | tojson }};

  const ctx = document.getElementById('myChart');

  if (ctx) {
    new Chart(ctx, {
      type: 'doughnut',
      data: {
        labels: ['Income', 'Expense'],
        datasets: [{
          data: [income, expense],
          backgroundColor: ['#28a745', '#dc3545']
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: {
            position: 'bottom'
          }
        }
      }
    });
  }
</script>

<!-- ================= SMOOTH SCROLL ================= -->
<script>
  document.querySelectorAll('.menu-btn').forEach(btn => {
    btn.addEventListener('click', function(e) {
      e.preventDefault();

      const target = document.querySelector(this.getAttribute('href'));
      if (target) {
        target.scrollIntoView({
          behavior: 'smooth',
          block: 'start'
        });
      }
    });
  });
</script>

</body>
</html>
